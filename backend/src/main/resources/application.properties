spring.application.name=dolbom-backend
server.port=8080

# .env 또는 OS 환경변수에서 주입 (backend/.env 참고)
anthropic.api-key=${ANTHROPIC_API_KEY:}
google.api-key=${GOOGLE_API_KEY:}
gemini.model=gemini-3-flash-preview
firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}
spring.config.import=optional:file:.env[.properties]
clova.speech.invoke-url=${CLOVA_SPEECH_INVOKE_URL:}
clova.speech.secret-key=${CLOVA_SPEECH_SECRET_KEY:}

# Claude 요청/응답 원문 로그 파일 경로 (CLAUDE.md 5절 로깅 요구사항)
claude.io-log-path=logs/claude-io.log

# 음성 파일 업로드 용량 제한 (기능1 /api/stt)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB