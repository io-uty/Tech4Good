spring.application.name=dolbom-backend
server.port=8080

# .env 또는 OS 환경변수에서 주입 (backend/.env 참고)
anthropic.api-key=${ANTHROPIC_API_KEY:}
firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}
naver.clova.client-id=${NAVER_CLOVA_CLIENT_ID:}
naver.clova.client-secret=${NAVER_CLOVA_CLIENT_SECRET:}

# Claude 요청/응답 원문 로그 파일 경로 (CLAUDE.md 5절 로깅 요구사항)
claude.io-log-path=logs/claude-io.log

# 음성 파일 업로드 용량 제한 (기능1 /api/stt)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB